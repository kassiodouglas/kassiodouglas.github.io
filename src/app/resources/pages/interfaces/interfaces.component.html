<div class="box p-3 mb-5">
    <h1>Uso de interfaces</h1>
    <p>Força o uso de padrões para gerar arrays/objetos</p>

    <div class="list-group">
        <div *ngFor="let animal of animals" class="list-group-item list-group-item-action">
          {{animal.name}} - {{animal.type}}
          <button class="btn btn-info" (click)="showAge(animal)">Ver idade</button>
          <button class="btn btn-danger" (click)="removeAnimal(animal)">Excluir</button>
        </div>
    </div>

</div>
